<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 817" fill="none">
  <!-- Magenta + laranja, ondas fluidas (vibe consumer mais informal que Itaú) -->
  <defs>
    <linearGradient id="magFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2007A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E2007A" stop-opacity="0.00"/>
    </linearGradient>
    <linearGradient id="orgFade" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6A13" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF6A13" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- Onda magenta no topo esquerdo -->
  <path d="M -50 0 Q 150 180 -50 360 Z" fill="url(#magFade)" opacity="0.95"/>

  <!-- Anel concêntrico (símbolo de score/círculo de confiança) -->
  <circle cx="120" cy="200" r="180" fill="none" stroke="#E2007A" stroke-width="1" stroke-opacity="0.10"/>
  <circle cx="120" cy="200" r="120" fill="none" stroke="#E2007A" stroke-width="1" stroke-opacity="0.14"/>
  <circle cx="120" cy="200" r="60" fill="none" stroke="#E2007A" stroke-width="1.5" stroke-opacity="0.22"/>
  <circle cx="120" cy="200" r="14" fill="#E2007A" fill-opacity="0.55"/>

  <!-- Curva de score subindo -->
  <path d="M 0 600 Q 120 580 220 540 T 590 480"
        fill="none" stroke="#E2007A" stroke-width="1.8" stroke-opacity="0.30"/>
  <circle cx="220" cy="540" r="4" fill="#FF6A13"/>
  <circle cx="380" cy="510" r="4" fill="#FF6A13"/>
  <circle cx="530" cy="490" r="4" fill="#FF6A13"/>

  <!-- Ponto laranja inferior -->
  <rect x="0" y="730" width="280" height="3" fill="url(#orgFade)"/>
</svg>
