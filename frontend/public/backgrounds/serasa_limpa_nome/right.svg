<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 817" fill="none">
  <defs>
    <linearGradient id="magR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2007A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#E2007A" stop-opacity="0.00"/>
    </linearGradient>
    <linearGradient id="orgR" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6A13" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FF6A13" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- Onda laranja no topo direito -->
  <path d="M 640 0 Q 380 200 640 380 Z" fill="url(#orgR)" opacity="0.95"/>

  <!-- Anel grande à direita -->
  <circle cx="470" cy="240" r="200" fill="none" stroke="#E2007A" stroke-width="1" stroke-opacity="0.10"/>
  <circle cx="470" cy="240" r="140" fill="none" stroke="#E2007A" stroke-width="1" stroke-opacity="0.14"/>
  <circle cx="470" cy="240" r="80" fill="none" stroke="#FF6A13" stroke-width="1.5" stroke-opacity="0.20"/>

  <!-- "Check" simbólico (limpeza concluída) -->
  <path d="M 420 480 L 470 530 L 580 410"
        fill="none" stroke="#E2007A" stroke-width="3" stroke-opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ponto magenta inferior -->
  <circle cx="540" cy="700" r="6" fill="#E2007A" fill-opacity="0.55"/>

  <!-- Faixa laranja sutil -->
  <rect x="310" y="780" width="280" height="3" fill="url(#magR)"/>
</svg>
