<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 632 817" fill="none">
  <!-- Line graph with upward trend, bottom-right -->
  <!-- Grid lines -->
  <line x1="250" y1="550" x2="650" y2="550" stroke="#A3E2FF" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="620" x2="650" y2="620" stroke="#A3E2FF" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="690" x2="650" y2="690" stroke="#A3E2FF" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="480" x2="650" y2="480" stroke="#A3E2FF" stroke-width="1" opacity="0.2"/>

  <!-- Area fill under line -->
  <polygon points="280,720 340,690 400,700 460,640 520,580 580,520 640,460 640,817 280,817" fill="#D4F0FF" opacity="0.4"/>

  <!-- Main trend line -->
  <polyline points="280,720 340,690 400,700 460,640 520,580 580,520 640,460" stroke="#3BAADB" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Secondary trend line -->
  <polyline points="300,750 360,730 420,740 480,690 540,640 600,590 650,540" stroke="#A3E2FF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points on main line -->
  <circle cx="340" cy="690" r="6" fill="white" stroke="#3BAADB" stroke-width="3"/>
  <circle cx="400" cy="700" r="6" fill="white" stroke="#3BAADB" stroke-width="3"/>
  <circle cx="460" cy="640" r="6" fill="white" stroke="#3BAADB" stroke-width="3"/>
  <circle cx="520" cy="580" r="6" fill="white" stroke="#3BAADB" stroke-width="3"/>
  <circle cx="580" cy="520" r="6" fill="white" stroke="#3BAADB" stroke-width="3"/>

  <!-- Green uptrend arrow on line chart -->
  <line x1="560" y1="540" x2="640" y2="440" stroke="#33D6A4" stroke-width="3" stroke-linecap="round"/>
  <polygon points="640,440 620,460 645,465" fill="#33D6A4"/>

  <!-- Baseline axis -->
  <line x1="270" y1="760" x2="650" y2="760" stroke="#3BAADB" stroke-width="2"/>
  <line x1="270" y1="400" x2="270" y2="760" stroke="#3BAADB" stroke-width="2"/>

  <!-- Pie chart, top-right, partially cut off -->
  <circle cx="570" cy="130" r="110" fill="#D4F0FF"/>
  <!-- Segment 1 - large -->
  <path d="M570,130 L570,20 A110,110 0 0,1 668,80 Z" fill="#3BAADB"/>
  <!-- Segment 2 -->
  <path d="M570,130 L668,80 A110,110 0 0,1 650,220 Z" fill="#6fd3ff"/>
  <!-- Segment 3 -->
  <path d="M570,130 L650,220 A110,110 0 0,1 530,235 Z" fill="#A3E2FF"/>
  <!-- Segment 4 - remaining -->
  <path d="M570,130 L530,235 A110,110 0 0,1 570,20 Z" fill="#D4F0FF" stroke="#A3E2FF" stroke-width="1"/>
  <!-- Pie chart border -->
  <circle cx="570" cy="130" r="110" stroke="#3BAADB" stroke-width="2.5" fill="none"/>
  <!-- Inner circle (donut) -->
  <circle cx="570" cy="130" r="45" fill="#EBF3FA"/>
  <circle cx="570" cy="130" r="45" stroke="#A3E2FF" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Briefcase icon, mid-right -->
  <rect x="480" y="320" width="80" height="60" rx="6" fill="#6fd3ff"/>
  <rect x="480" y="320" width="80" height="60" rx="6" stroke="#3BAADB" stroke-width="2.5" fill="none"/>
  <!-- Briefcase handle -->
  <path d="M505,320 L505,308 C505,300 515,296 520,296 C525,296 535,300 535,308 L535,320" stroke="#3BAADB" stroke-width="2.5" fill="none"/>
  <!-- Briefcase middle band -->
  <line x1="480" y1="345" x2="560" y2="345" stroke="#3BAADB" stroke-width="2"/>
  <!-- Briefcase clasp -->
  <rect x="512" y="339" width="16" height="12" rx="3" fill="#1F7AA3"/>

  <!-- Stock ticker tape elements -->
  <!-- Ticker strip top area -->
  <rect x="300" y="40" width="120" height="28" rx="5" fill="#A3E2FF" opacity="0.4"/>
  <rect x="430" y="40" width="90" height="28" rx="5" fill="#6fd3ff" opacity="0.35"/>
  <rect x="530" y="40" width="110" height="28" rx="5" fill="#D4F0FF" opacity="0.3"/>
  <!-- Second ticker row -->
  <rect x="360" y="76" width="100" height="28" rx="5" fill="#D4F0FF" opacity="0.3"/>
  <rect x="470" y="76" width="80" height="28" rx="5" fill="#A3E2FF" opacity="0.25"/>
  <rect x="560" y="76" width="80" height="28" rx="5" fill="#6fd3ff" opacity="0.2"/>

  <!-- Small green/red ticker indicators -->
  <polygon points="320,52 328,44 336,52" fill="#33D6A4" opacity="0.5"/>
  <polygon points="450,52 458,60 466,52" fill="#E85D5D" opacity="0.4"/>
  <polygon points="550,52 558,44 566,52" fill="#33D6A4" opacity="0.35"/>
  <!-- Ticker value bars -->
  <rect x="340" y="49" width="50" height="4" rx="2" fill="#3BAADB" opacity="0.3"/>
  <rect x="470" y="49" width="40" height="4" rx="2" fill="#3BAADB" opacity="0.25"/>

  <!-- Newspaper / document pages, right side -->
  <!-- Document 1, large, partially off-screen -->
  <rect x="530" y="430" width="130" height="170" rx="8" fill="white" opacity="0.5"/>
  <rect x="530" y="430" width="130" height="170" rx="8" stroke="#A3E2FF" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Document header line -->
  <rect x="548" y="450" width="70" height="6" rx="3" fill="#3BAADB" opacity="0.35"/>
  <!-- Document body lines -->
  <rect x="548" y="470" width="94" height="4" rx="2" fill="#A3E2FF" opacity="0.3"/>
  <rect x="548" y="482" width="88" height="4" rx="2" fill="#A3E2FF" opacity="0.25"/>
  <rect x="548" y="494" width="94" height="4" rx="2" fill="#A3E2FF" opacity="0.25"/>
  <rect x="548" y="506" width="60" height="4" rx="2" fill="#A3E2FF" opacity="0.2"/>
  <!-- Mini chart in document -->
  <rect x="548" y="524" width="94" height="50" rx="4" fill="#D4F0FF" opacity="0.3"/>
  <polyline points="554,564 568,555 580,560 594,545 610,540 630,530" stroke="#6fd3ff" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Document 2, behind and offset -->
  <rect x="560" y="415" width="110" height="150" rx="8" fill="white" opacity="0.25"/>
  <rect x="560" y="415" width="110" height="150" rx="8" stroke="#D4F0FF" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Large decorative circle, partially visible right edge -->
  <circle cx="680" cy="650" r="140" stroke="#6fd3ff" stroke-width="3" fill="none" opacity="0.2"/>
  <circle cx="680" cy="650" r="105" stroke="#A3E2FF" stroke-width="2" fill="none" opacity="0.12"/>

  <!-- Dashboard panel outline -->
  <rect x="350" y="260" width="290" height="160" rx="12" stroke="#6fd3ff" stroke-width="2" fill="none" opacity="0.12"/>
  <line x1="350" y1="295" x2="640" y2="295" stroke="#6fd3ff" stroke-width="1.5" opacity="0.12"/>

  <!-- Decorative accent dots, fading left -->
  <circle cx="250" cy="300" r="4" fill="#A3E2FF" opacity="0.2"/>
  <circle cx="230" cy="340" r="3" fill="#D4F0FF" opacity="0.15"/>
  <circle cx="210" cy="280" r="3" fill="#6fd3ff" opacity="0.12"/>
  <circle cx="270" cy="450" r="3" fill="#A3E2FF" opacity="0.15"/>
  <circle cx="300" cy="380" r="4" fill="#D4F0FF" opacity="0.12"/>

  <!-- Subtle up-arrows scattered -->
  <polygon points="380,310 388,298 396,310" fill="#33D6A4" opacity="0.15"/>
  <polygon points="600,300 606,290 612,300" fill="#33D6A4" opacity="0.12"/>

  <!-- Horizontal bar indicators in dashboard -->
  <rect x="370" y="310" width="80" height="10" rx="5" fill="#6fd3ff" opacity="0.2"/>
  <rect x="370" y="330" width="120" height="10" rx="5" fill="#A3E2FF" opacity="0.18"/>
  <rect x="370" y="350" width="60" height="10" rx="5" fill="#D4F0FF" opacity="0.15"/>
  <rect x="370" y="370" width="100" height="10" rx="5" fill="#6fd3ff" opacity="0.12"/>
</svg>