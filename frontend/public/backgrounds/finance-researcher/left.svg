<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 817" fill="none">
  <!-- Large ascending bar chart, bottom-left -->
  <rect x="-30" y="580" width="70" height="237" rx="4" fill="#D4F0FF"/>
  <rect x="50" y="500" width="70" height="317" rx="4" fill="#A3E2FF"/>
  <rect x="130" y="400" width="70" height="417" rx="4" fill="#6fd3ff"/>
  <rect x="210" y="310" width="70" height="507" rx="4" fill="#3BAADB"/>
  <rect x="290" y="380" width="70" height="437" rx="4" fill="#6fd3ff" opacity="0.6"/>
  <rect x="370" y="460" width="70" height="357" rx="4" fill="#A3E2FF" opacity="0.4"/>

  <!-- Uptrend arrow over bars -->
  <line x1="5" y1="560" x2="325" y2="270" stroke="#33D6A4" stroke-width="5" stroke-linecap="round"/>
  <polygon points="325,270 300,300 340,308" fill="#33D6A4"/>

  <!-- Candlestick chart, upper-left -->
  <rect x="20" y="100" width="260" height="220" rx="10" fill="#D4F0FF" opacity="0.5"/>
  <line x1="20" y1="140" x2="280" y2="140" stroke="#A3E2FF" stroke-width="1.5"/>
  <!-- Candle 1 green -->
  <line x1="60" y1="170" x2="60" y2="290" stroke="#33D6A4" stroke-width="2.5"/>
  <rect x="46" y="195" width="28" height="60" rx="3" fill="#33D6A4"/>
  <!-- Candle 2 red -->
  <line x1="105" y1="180" x2="105" y2="300" stroke="#E85D5D" stroke-width="2.5"/>
  <rect x="91" y="205" width="28" height="65" rx="3" fill="#E85D5D"/>
  <!-- Candle 3 green -->
  <line x1="150" y1="155" x2="150" y2="275" stroke="#33D6A4" stroke-width="2.5"/>
  <rect x="136" y="170" width="28" height="70" rx="3" fill="#33D6A4"/>
  <!-- Candle 4 red -->
  <line x1="195" y1="165" x2="195" y2="285" stroke="#E85D5D" stroke-width="2.5"/>
  <rect x="181" y="190" width="28" height="55" rx="3" fill="#E85D5D"/>
  <!-- Candle 5 green (tallest) -->
  <line x1="240" y1="150" x2="240" y2="280" stroke="#33D6A4" stroke-width="2.5"/>
  <rect x="226" y="158" width="28" height="80" rx="3" fill="#33D6A4"/>

  <!-- Magnifying glass over last candle -->
  <circle cx="240" cy="158" r="45" stroke="#1F7AA3" stroke-width="4" fill="#D4F0FF" fill-opacity="0.3"/>
  <line x1="272" y1="190" x2="308" y2="226" stroke="#1F7AA3" stroke-width="6" stroke-linecap="round"/>

  <!-- Dollar sign circle, left edge -->
  <circle cx="-20" cy="420" r="65" fill="#A3E2FF" opacity="0.7"/>
  <circle cx="-20" cy="420" r="65" stroke="#3BAADB" stroke-width="3" fill="none"/>
  <line x1="-20" y1="390" x2="-20" y2="450" stroke="#1F7AA3" stroke-width="4" stroke-linecap="round"/>
  <path d="M-36,403 C-36,393 -4,393 -4,403 C-4,413 -36,418 -36,428 C-36,438 -4,443 -4,433" stroke="#1F7AA3" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Trend lines lower section -->
  <polyline points="-20,700 100,660 200,680 300,590 400,530 480,470" stroke="#3BAADB" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="660" r="6" fill="#3BAADB"/>
  <circle cx="200" cy="680" r="6" fill="#3BAADB"/>
  <circle cx="300" cy="590" r="6" fill="#3BAADB"/>
  <circle cx="400" cy="530" r="6" fill="#3BAADB"/>

  <!-- Grid lines -->
  <line x1="0" y1="400" x2="420" y2="400" stroke="#A3E2FF" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="500" x2="370" y2="500" stroke="#A3E2FF" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="600" x2="320" y2="600" stroke="#A3E2FF" stroke-width="1" opacity="0.3"/>

  <!-- Ticker bars top-left -->
  <rect x="-40" y="30" width="200" height="26" rx="5" fill="#A3E2FF" opacity="0.6"/>
  <rect x="-40" y="64" width="160" height="26" rx="5" fill="#D4F0FF" opacity="0.5"/>
  <circle cx="140" cy="43" r="6" fill="#33D6A4"/>
  <circle cx="100" cy="77" r="5" fill="#E85D5D"/>

  <!-- Large decorative ring, left edge -->
  <circle cx="-80" cy="650" r="130" stroke="#6fd3ff" stroke-width="3" fill="none" opacity="0.35"/>
  <circle cx="-80" cy="650" r="100" stroke="#A3E2FF" stroke-width="2" fill="none" opacity="0.25"/>

  <!-- Accent dots fading right -->
  <circle cx="350" cy="150" r="5" fill="#6fd3ff" opacity="0.35"/>
  <circle cx="380" cy="130" r="4" fill="#A3E2FF" opacity="0.3"/>
  <circle cx="420" cy="200" r="3" fill="#3BAADB" opacity="0.2"/>
  <circle cx="460" cy="350" r="4" fill="#A3E2FF" opacity="0.15"/>

  <!-- Small uptrend triangles -->
  <polygon points="430,340 445,310 460,340" fill="#33D6A4" opacity="0.3"/>
  <polygon points="480,280 492,256 504,280" fill="#33D6A4" opacity="0.2"/>
</svg>
