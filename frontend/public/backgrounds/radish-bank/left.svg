<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 817">
  <defs>
    <style>
      .g1{fill:#2ecc71}.g2{fill:#219653}.g3{fill:#6EE7A0}.g4{fill:#C8F5D8}.g5{fill:#15793E}.gold{fill:#F1C40F}.wh{fill:#fff}
    </style>
  </defs>

  <!-- VAULT DOOR - large circle bottom-left, partially cut off -->
  <circle class="g2" cx="60" cy="740" r="260"/>
  <circle class="g5" cx="60" cy="740" r="220"/>
  <circle class="g2" cx="60" cy="740" r="190"/>
  <!-- vault ring detail -->
  <circle cx="60" cy="740" r="170" fill="none" stroke="#6EE7A0" stroke-width="6"/>
  <circle cx="60" cy="740" r="150" fill="none" stroke="#C8F5D8" stroke-width="3"/>
  <!-- vault handle/spoke -->
  <g>
    <rect class="g3" x="30" y="710" width="60" height="60" rx="8"/>
    <rect class="g1" x="42" y="722" width="36" height="36" rx="6"/>
    <!-- spokes radiating from handle center -->
    <rect class="g4" x="56" y="680" width="8" height="120" rx="4"/>
    <rect class="g4" x="0" y="736" width="120" height="8" rx="4"/>
    <rect class="g4" x="16" y="696" width="8" height="96" rx="4" transform="rotate(45 60 740)"/>
    <rect class="g4" x="16" y="696" width="8" height="96" rx="4" transform="rotate(-45 60 740)"/>
    <!-- center bolt -->
    <circle class="wh" cx="60" cy="740" r="10"/>
    <circle class="g5" cx="60" cy="740" r="6"/>
  </g>
  <!-- vault door edge details -->
  <rect class="g5" x="-10" y="560" width="20" height="30" rx="5"/>
  <rect class="g5" x="-10" y="610" width="20" height="30" rx="5"/>
  <rect class="g5" x="-10" y="660" width="20" height="30" rx="5"/>

  <!-- CREDIT CARDS - stacked at angle, top-left area -->
  <!-- Card 1 (back card) -->
  <g transform="translate(30, 80) rotate(-15)">
    <rect class="g2" width="180" height="112" rx="14"/>
    <rect class="g3" x="16" y="18" width="40" height="30" rx="5"/>
    <rect class="g4" x="16" y="68" width="120" height="10" rx="5"/>
    <rect class="g4" x="16" y="86" width="80" height="8" rx="4"/>
  </g>
  <!-- Card 2 (front card) -->
  <g transform="translate(60, 120) rotate(-8)">
    <rect class="g1" width="180" height="112" rx="14"/>
    <rect class="gold" x="16" y="18" width="40" height="30" rx="5"/>
    <rect class="wh" x="16" y="18" width="40" height="30" rx="5" opacity="0.3"/>
    <!-- chip lines -->
    <rect class="g5" x="22" y="26" width="12" height="2" rx="1"/>
    <rect class="g5" x="22" y="31" width="12" height="2" rx="1"/>
    <rect class="g5" x="22" y="36" width="12" height="2" rx="1"/>
    <!-- card number dots -->
    <circle class="wh" cx="30" cy="68" r="3"/>
    <circle class="wh" cx="40" cy="68" r="3"/>
    <circle class="wh" cx="50" cy="68" r="3"/>
    <circle class="wh" cx="60" cy="68" r="3"/>
    <circle class="wh" cx="80" cy="68" r="3"/>
    <circle class="wh" cx="90" cy="68" r="3"/>
    <circle class="wh" cx="100" cy="68" r="3"/>
    <circle class="wh" cx="110" cy="68" r="3"/>
    <rect class="wh" x="16" y="86" width="60" height="8" rx="4" opacity="0.5"/>
    <!-- contactless symbol -->
    <path d="M148 26 a8 8 0 0 1 0 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <path d="M153 22 a14 14 0 0 1 0 20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <path d="M158 18 a20 20 0 0 1 0 28" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- COINS - scattered around middle-left -->
  <!-- Large coin 1 -->
  <g transform="translate(40, 380)">
    <ellipse class="gold" cx="0" cy="0" rx="55" ry="55"/>
    <ellipse cx="0" cy="0" rx="55" ry="55" fill="#fff" opacity="0.15"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#F1C40F" stroke-width="3"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <!-- dollar sign -->
    <rect class="g5" x="-3" y="-22" width="6" height="44" rx="3"/>
    <path d="M-14 -10 a16 16 0 0 1 28 0" fill="none" stroke="#15793E" stroke-width="4" stroke-linecap="round"/>
    <path d="M-14 10 a16 16 0 0 0 28 0" fill="none" stroke="#15793E" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Medium coin 2 -->
  <g transform="translate(160, 320)">
    <circle class="gold" r="38"/>
    <circle r="38" fill="#fff" opacity="0.1"/>
    <circle r="28" fill="none" stroke="#F1C40F" stroke-width="2.5"/>
  </g>

  <!-- Small coin 3 -->
  <circle class="gold" cx="120" cy="440" r="24"/>
  <circle cx="120" cy="440" r="18" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>

  <!-- Tiny coin 4 -->
  <circle class="gold" cx="200" cy="390" r="16"/>
  <circle cx="200" cy="390" r="12" fill="none" stroke="#15793E" stroke-width="1.5"/>

  <!-- Stacked coins (edge view) -->
  <g transform="translate(170, 470)">
    <rect class="gold" x="-30" y="0" width="60" height="8" rx="4"/>
    <rect x="-30" y="0" width="60" height="8" rx="4" fill="#fff" opacity="0.15"/>
    <rect class="gold" x="-30" y="-10" width="60" height="8" rx="4"/>
    <rect class="gold" x="-30" y="-20" width="60" height="8" rx="4"/>
    <rect x="-30" y="-20" width="60" height="8" rx="4" fill="#fff" opacity="0.1"/>
    <rect class="gold" x="-28" y="-30" width="56" height="8" rx="4"/>
    <rect class="gold" x="-26" y="-40" width="52" height="8" rx="4"/>
    <rect x="-26" y="-40" width="52" height="8" rx="4" fill="#fff" opacity="0.15"/>
  </g>

  <!-- PIGGY BANK SILHOUETTE - mid-left -->
  <g transform="translate(30, 560)">
    <!-- body -->
    <ellipse class="g3" cx="65" cy="30" rx="65" ry="45"/>
    <!-- head -->
    <circle class="g3" cx="130" cy="10" r="30"/>
    <!-- snout -->
    <ellipse class="g1" cx="155" cy="16" rx="14" ry="10"/>
    <circle class="g5" cx="151" cy="14" r="2.5"/>
    <circle class="g5" cx="159" cy="14" r="2.5"/>
    <!-- ear -->
    <ellipse class="g1" cx="118" cy="-14" rx="12" ry="16"/>
    <ellipse class="g4" cx="118" cy="-12" rx="7" ry="10"/>
    <!-- eye -->
    <circle class="g5" cx="138" cy="2" r="4"/>
    <circle class="wh" cx="136" cy="0" r="1.5"/>
    <!-- legs -->
    <rect class="g1" x="30" y="65" width="16" height="24" rx="6"/>
    <rect class="g1" x="90" y="65" width="16" height="24" rx="6"/>
    <!-- coin slot -->
    <rect class="g2" x="50" y="-8" width="30" height="5" rx="2.5"/>
    <!-- tail -->
    <path d="M0 20 Q-12 10 -8 -2 Q-4 -10 -14 -14" fill="none" stroke="#6EE7A0" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- SECURITY SHIELD WITH CHECKMARK - upper-middle area -->
  <g transform="translate(280, 280)">
    <!-- shield shape -->
    <path class="g1" d="M0-60 L50-40 L50 10 Q50 50 0 70 Q-50 50 -50 10 L-50-40 Z"/>
    <path class="g3" d="M0-48 L40-32 L40 8 Q40 40 0 58 Q-40 40 -40 8 L-40-32 Z"/>
    <path class="g4" d="M0-36 L30-24 L30 6 Q30 30 0 46 Q-30 30 -30 6 L-30-24 Z"/>
    <!-- checkmark -->
    <path d="M-16 4 L-4 16 L20-12" fill="none" stroke="#15793E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots and shapes -->
  <circle class="g4" cx="300" cy="160" r="8"/>
  <circle class="g4" cx="340" cy="200" r="5"/>
  <circle class="g3" cx="260" cy="450" r="6"/>
  <circle class="g4" cx="350" cy="380" r="4"/>
  <circle class="g4" cx="190" cy="250" r="7"/>

  <!-- Small plus signs as decorative elements -->
  <g opacity="0.4">
    <rect class="g3" x="310" y="130" width="3" height="14" rx="1.5"/>
    <rect class="g3" x="304.5" y="135.5" width="14" height="3" rx="1.5"/>
    <rect class="g3" x="230" y="500" width="3" height="14" rx="1.5"/>
    <rect class="g3" x="224.5" y="505.5" width="14" height="3" rx="1.5"/>
    <rect class="g3" x="360" y="450" width="3" height="14" rx="1.5"/>
    <rect class="g3" x="354.5" y="455.5" width="14" height="3" rx="1.5"/>
  </g>

  <!-- Floating diamond shapes -->
  <rect class="g4" x="350" y="300" width="10" height="10" rx="2" transform="rotate(45 355 305)" opacity="0.5"/>
  <rect class="g4" x="270" y="530" width="8" height="8" rx="1.5" transform="rotate(45 274 534)" opacity="0.4"/>
</svg>