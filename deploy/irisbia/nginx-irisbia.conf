# irisbia.platformengineer.io — BIA (Bradesco) demo
# O bastion usa nginx + certbot (NÃO Caddy). Este vhost espelha o padrão do
# keynoteaws.platformengineer.io que já roda na caixa, somando basic_auth + SSE + SPA.
#
# Instalar:
#   sudo cp deploy/irisbia/nginx-irisbia.conf /etc/nginx/sites-available/irisbia.platformengineer.io
#   sudo ln -s /etc/nginx/sites-available/irisbia.platformengineer.io /etc/nginx/sites-enabled/
#   # cert (DNS já apontando pro EIP):
#   sudo certbot certonly --nginx -d irisbia.platformengineer.io
#   # basic_auth (sem apache2-utils, via openssl):
#   printf "iris:$(openssl passwd -apr1 'SUA_SENHA')\n" | sudo tee /etc/nginx/.htpasswd-irisbia
#   sudo nginx -t && sudo systemctl reload nginx
#
# Depende do map $connection_upgrade (já existe em /etc/nginx/conf.d/upgrade.conf no host).

# HTTP: ACME challenge + redirect 301 pra HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name irisbia.platformengineer.io;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    return 301 https://$host$request_uri;
}

# HTTPS: TLS + basic_auth + SPA estática + /api proxy (com SSE)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name irisbia.platformengineer.io;

    ssl_certificate     /etc/letsencrypt/live/irisbia.platformengineer.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/irisbia.platformengineer.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gate de acesso: uma credencial pra plateia (usuário "iris").
    auth_basic "irisbia";
    auth_basic_user_file /etc/nginx/.htpasswd-irisbia;

    # API do backend + streaming SSE (/api/chat/stream, /api/domain-events/stream).
    # proxy_buffering off + timeout longo = eventos chegam na hora, sem cortar o stream.
    location /api/ {
        proxy_pass http://127.0.0.1:8040;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }

    # Frontend estático (Vite build) servido pelo nginx
    root /opt/iris-bia/dist;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
}
