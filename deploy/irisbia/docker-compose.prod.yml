# Stack de produção da BIA (Bradesco) em irisbia.platformengineer.io
#
# Topologia (bastion Ubuntu, AWS sa-east-1):
#   - backend container (FastAPI uvicorn) escuta em 8040, mapeado pra 127.0.0.1:8040 do host
#   - Caddy do HOST faz HTTPS (Let's Encrypt) + basic_auth + reverse proxy:
#       irisbia.platformengineer.io  →  /      →  /opt/iris-bia/dist/   (frontend estático)
#       irisbia.platformengineer.io  →  /api/* →  127.0.0.1:8040        (backend)
#   - Sem Redis local: o Redis Cloud Pro (sa-east-1, via PrivateLink, endpoint alcançável)
#     e os 3 control planes gerenciados (Context Surfaces, Agent Memory, LangCache) são externos.
#
# Como subir (a partir de /opt/iris-bia/code, normalmente via scripts/deploy_iris_bia.sh):
#   docker compose -f deploy/irisbia/docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      # contexto = raiz do repo (este arquivo está em deploy/irisbia/)
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    container_name: iris-bia-backend
    restart: unless-stopped
    env_file:
      - /opt/iris-bia/.env
    ports:
      # Apenas localhost — Caddy do host faz o reverse proxy
      - "127.0.0.1:8040:8040"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8040/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
