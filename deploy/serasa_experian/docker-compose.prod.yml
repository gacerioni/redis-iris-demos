# Stack de producao do Serasa Experian em serasa.platformengineer.io
#
# Topologia (bastion Ubuntu, AWS sa-east-1 — mesmo host do irisbia):
#   - backend container (FastAPI uvicorn) escuta em 8041, mapeado pra 127.0.0.1:8041 do host
#   - nginx do HOST faz HTTPS (Let's Encrypt) + basic_auth + reverse proxy:
#       serasa.platformengineer.io  ->  /      ->  /opt/iris-serasa/dist/   (frontend estatico)
#       serasa.platformengineer.io  ->  /api/* ->  127.0.0.1:8041           (backend)
#   - irisbia continua em 8040 — NAO toca nessa porta
#   - Redis Cloud novo (scholarly-houses-jade-87635, endpoint publico) e os 3 SaaS externos.
#
# Como subir (a partir de /opt/iris-serasa/code, normalmente via scripts/deploy_iris_serasa.sh):
#   docker compose -f deploy/serasa_experian/docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    container_name: iris-serasa-backend
    restart: unless-stopped
    env_file:
      - /opt/iris-serasa/.env
    ports:
      # Apenas localhost — nginx do host faz o reverse proxy
      # Container roda na 8040 (Dockerfile hardcode); mapeamos pra 8041 no host pra coexistir com irisbia
      - "127.0.0.1:8041:8040"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8040/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
