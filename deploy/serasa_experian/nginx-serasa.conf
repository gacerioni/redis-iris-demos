# serasa.platformengineer.io — Serasa Experian demo
# Mesmo padrao do irisbia, porta 8041 (irisbia usa 8040).
#
# Instalar:
#   sudo cp deploy/serasa_experian/nginx-serasa.conf /etc/nginx/sites-available/serasa.platformengineer.io
#   sudo ln -s /etc/nginx/sites-available/serasa.platformengineer.io /etc/nginx/sites-enabled/
#   sudo certbot certonly --nginx -d serasa.platformengineer.io
#   printf "iris:$(openssl passwd -apr1 'SUA_SENHA')\n" | sudo tee /etc/nginx/.htpasswd-serasa
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name serasa.platformengineer.io;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name serasa.platformengineer.io;

    ssl_certificate     /etc/letsencrypt/live/serasa.platformengineer.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serasa.platformengineer.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    auth_basic "serasa";
    auth_basic_user_file /etc/nginx/.htpasswd-serasa;

    location /api/ {
        proxy_pass http://127.0.0.1:8041;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }

    root /opt/iris-serasa/dist;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
}
